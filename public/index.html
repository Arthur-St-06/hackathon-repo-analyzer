<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue Researcher</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: #1f2328;
      background: #f6f8fa;
    }

    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }

    code {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Consolas, monospace;
      font-size: 85%;
      background: #eaeef2;
      padding: 0.1em 0.35em;
      border-radius: 4px;
    }

    /* ── Header ── */
    header {
      background: white;
      border-bottom: 1px solid #d0d7de;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 16px; font-weight: 600; }
    #header-meta { font-size: 13px; color: #57606a; }

    /* ── Layouts ── */
    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .split {
      display: flex;
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 24px;
      gap: 20px;
      align-items: flex-start;
    }

    /* ── Step card (initial + group-selected states) ── */
    .step-card {
      background: white;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      padding: 40px 40px 36px;
      max-width: 560px;
      margin: 0 auto;
    }
    .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #0969da;
      color: white;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .step-card h2 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
    .step-card p  { font-size: 13px; color: #57606a; line-height: 1.55; margin-bottom: 18px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid;
      transition: background 120ms, border-color 120ms;
    }
    .btn-primary {
      background: #0969da;
      border-color: #0969da;
      color: white;
    }
    .btn-primary:hover { background: #0757ba; border-color: #0757ba; }
    .btn-primary:disabled { background: #8c959f; border-color: #8c959f; cursor: default; }

    .btn-secondary {
      background: white;
      border-color: #d0d7de;
      color: #1f2328;
    }
    .btn-secondary:hover { background: #f3f4f6; }

    .step-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .step-error { margin-top: 10px; font-size: 12px; color: #a10000; }

    /* ── Sidebar ── */
    aside {
      width: 252px;
      flex-shrink: 0;
      position: sticky;
      top: 57px;
      max-height: calc(100vh - 77px);
      overflow-y: auto;
    }
    aside h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #57606a;
      margin-bottom: 8px;
      padding-left: 2px;
    }
    .group-list {
      background: white;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      overflow: hidden;
    }
    .group-item {
      padding: 10px 14px;
      border-bottom: 1px solid #d0d7de;
      cursor: pointer;
      transition: background 120ms;
      border-left: 3px solid transparent;
    }
    .group-item:last-child { border-bottom: none; }
    .group-item:hover { background: #f6f8fa; }
    .group-item.selected {
      background: #ddf4ff;
      border-left-color: #0969da;
      padding-left: 11px;
    }
    .group-name {
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .findings-badge {
      background: #0969da;
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .group-sub {
      font-size: 11px;
      color: #57606a;
      margin-top: 1px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .act-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .act-high   { background: #1a7f37; }
    .act-medium { background: #9a6700; }
    .act-low    { background: #57606a; }

    /* ── Main panel ── */
    .main { flex: 1; min-width: 0; }
    .panel-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
    .panel-title  { font-size: 15px; font-weight: 600; }
    .panel-sub    { font-size: 13px; color: #57606a; }

    /* ── Issue cards ── */
    .issue-list { display: flex; flex-direction: column; gap: 8px; }

    .issue-card {
      background: white;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .card-left  { flex: 1; min-width: 0; }
    .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; position: relative; }

    .conf-tooltip-wrap { position: relative; }
    .conf-tooltip {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      width: 260px;
      background: #1f2328;
      color: #e6edf3;
      font-size: 11px;
      line-height: 1.6;
      padding: 10px 12px;
      border-radius: 8px;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }
    .conf-tooltip::before {
      content: '';
      position: absolute;
      top: -5px;
      right: 14px;
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-bottom: 5px solid #1f2328;
    }
    .conf-tooltip-wrap:hover .conf-tooltip { display: block; }
    .conf-row { display: flex; justify-content: space-between; gap: 12px; }
    .conf-row + .conf-row { border-top: 1px solid #30363d; margin-top: 4px; padding-top: 4px; }
    .conf-delta { font-weight: 700; flex-shrink: 0; }
    .conf-delta.pos { color: #3fb950; }
    .conf-delta.neg { color: #f85149; }
    .conf-delta.neu { color: #8b949e; }

    .issue-num  { font-size: 11px; color: #57606a; font-family: ui-monospace, monospace; margin-bottom: 3px; }
    .issue-title { font-size: 14px; font-weight: 600; margin-bottom: 9px; line-height: 1.4; }
    .issue-title a { color: #1f2328; }
    .issue-title a:hover { color: #0969da; text-decoration: none; }

    .card-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; margin-bottom: 6px; }
    .card-chips { display: flex; flex-wrap: wrap; gap: 5px; }

    .conf-badge { font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 12px; color: white; }
    .conf-hi  { background: #1a7f37; }
    .conf-med { background: #9a6700; }
    .conf-lo  { background: #57606a; }

    .issue-age { font-size: 11px; color: #8c959f; white-space: nowrap; }

    .class-pill { font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 12px; border: 1px solid; flex-shrink: 0; }
    .cls-correctness_silent     { background: #fff0f0; border-color: #ffb8b8; color: #a10000; }
    .cls-performance_regression { background: #fff8f0; border-color: #ffd9b3; color: #a05000; }
    .cls-missing_fast_path      { background: #f0f4ff; border-color: #c8d8ff; color: #0044aa; }
    .cls-unknown,.cls-ci_noise,.cls-maintainer_task { background: #f6f8fa; border-color: #d0d7de; color: #57606a; }

    .lbl { font-size: 11px; padding: 2px 6px; border-radius: 10px; border: 1px solid; }
    .lbl-module  { background: #f0f4ff; border-color: #c8d8ff66; color: #3730a3; }
    .lbl-special { background: #e6ffec; border-color: #4ac26b40; color: #116329; }
    .lbl-default { background: #f6f8fa; border-color: #d0d7de; color: #57606a; }

    .meta-chip { font-size: 11px; background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; padding: 2px 7px; color: #1f2328; }
    .meta-chip em { color: #57606a; font-style: normal; margin-right: 2px; }

    .blocker-pill { font-size: 11px; font-weight: 600; color: #a10000; background: #fff0f0; border: 1px solid #ffb8b8; border-radius: 6px; padding: 2px 7px; }
    .signal-summary { font-size: 11px; color: #57606a; }

    /* ── Pipeline progress ── */
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .progress-wrap { background: #eaeef2; border-radius: 6px; height: 8px; overflow: hidden; margin-bottom: 14px; }
    .progress-bar  {
      height: 100%; border-radius: 6px; min-width: 3px;
      background: linear-gradient(90deg, #0969da 40%, #79b8ff 50%, #0969da 60%);
      background-size: 300% 100%;
      animation: shimmer 2s linear infinite;
      transition: width 600ms ease;
    }
    .progress-msg { font-size: 13px; font-weight: 500; color: #1f2328; margin-bottom: 14px; }
    .run-log {
      max-height: 200px; overflow-y: auto;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Consolas, monospace;
      font-size: 11px; line-height: 1.6; color: #57606a;
      background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; padding: 8px 10px;
    }
    .run-log div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-ok   { color: #1a7f37; font-weight: 600; }
    .log-warn { color: #9a6700; }
    .log-err  { color: #a10000; }

    .repo-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 14px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Consolas, monospace;
      color: #1f2328;
      background: white;
      margin-bottom: 16px;
      transition: border-color 120ms, box-shadow 120ms;
    }
    .repo-input:focus {
      outline: none;
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9,105,218,0.12);
    }

    /* ── Custom topic search ── */
    .custom-topic-form {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .custom-topic-input {
      flex: 1;
      min-width: 0;
      padding: 6px 10px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      color: #1f2328;
      background: white;
      transition: border-color 120ms, box-shadow 120ms;
    }
    .custom-topic-input:focus {
      outline: none;
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9,105,218,0.12);
    }
    .custom-topic-btn {
      padding: 6px 10px;
      background: #0969da;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 120ms;
    }
    .custom-topic-btn:hover { background: #0757ba; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d0d7de; border-radius: 3px; }

    @media (max-width: 780px) {
      .split { flex-direction: column; padding: 12px; }
      aside { width: 100%; position: static; max-height: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>Issue Researcher</h1>
  <span id="header-meta"></span>
</header>

<div id="root"></div>

<script>
// ── Helpers ───────────────────────────────────────────────────────────────────

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function slugClass(s) { return String(s||'').replace(/[^a-z0-9_]/gi,'_'); }
function formatJustification(text) {
  if (!text) return '';
  return text.split('. ').map(step => {
    const m = step.match(/^(.+?)\s*→\s*([+-]\d+\.\d+)/);
    if (m) {
      const label = m[1].replace(/, total \S+$/, '').trim();
      const delta = m[2];
      const cls   = delta.startsWith('+') ? 'pos' : 'neg';
      return `<div class="conf-row"><span>${esc(label)}</span><span class="conf-delta ${cls}">${delta}</span></div>`;
    }
    // Base / Final lines
    const f = step.match(/^(Base|Final):\s*(\S+)/);
    if (f) return `<div class="conf-row"><span>${f[1]}</span><span class="conf-delta neu">${f[2]}</span></div>`;
    return '';
  }).filter(Boolean).join('');
}
function timeAgo(iso) {
  if (!iso) return '';
  const d = Math.floor((Date.now() - new Date(iso)) / 86400000);
  if (d < 1) return 'today';
  if (d < 30) return d + 'd ago';
  if (d < 365) return Math.floor(d/30) + 'mo ago';
  return Math.floor(d/365) + 'y ago';
}
function confClass(c) {
  if (c >= 0.90) return 'conf-hi';
  if (c >= 0.75) return 'conf-med';
  return 'conf-lo';
}
function renderCode(text) {
  return esc(text).replace(/`([^`]+)`/g, '<code>$1</code>');
}
function labelClass(l) {
  if (['triaged','help wanted','good first issue','actionable','high priority'].includes(l)) return 'lbl lbl-special';
  if (l.startsWith('module:')) return 'lbl lbl-module';
  return 'lbl lbl-default';
}
const ACTION_LABELS = {
  file_pr: 'Open a PR', file_issue: 'File an issue',
  revive_abandoned_pr: 'Revive abandoned PR',
  needs_human_review: 'Needs human review', reject: 'Reject',
};

// ── State ─────────────────────────────────────────────────────────────────────

const S = {
  phase: 'initial',
  repo: '',             // owner/repo being analyzed — populated from topic_groups.json
  groups: [],
  loadedFindings: {},   // {group_id: findings[]} — in-session per-group cache
  findingsIndex:  {},   // {group_id: {count, generated_at}} — from server index
  selectedId: null,
  expandedNum: null,
  // discovery (step 1)
  discovering:   false,
  discoverPct:   0,
  discoverMsg:   '',
  discoverLog:   [],
  discoverError: '',
  // pipeline (step 2)
  running:  false,
  runPct:   0,
  runMsg:   '',
  runLog:   [],
  runError: '',
};

// ── Actions ───────────────────────────────────────────────────────────────────

function submitRepo() {
  const raw = (document.getElementById('repo-input')?.value || '').trim();
  if (!raw) return;
  // Accept full GitHub URL or bare owner/repo
  const m = raw.match(/github\.com\/([^\s/]+\/[^\s/]+)/);
  const repo = m ? m[1].replace(/\.git$/, '') : raw;
  if (!/^[\w.\-]+\/[\w.\-]+$/.test(repo)) {
    S.discoverError = 'Invalid format — paste a GitHub URL or type owner/repo';
    render();
    return;
  }
  discoverRepo(repo);
}

async function discoverRepo(repo) {
  S.discovering   = true;
  S.discoverPct   = 0;
  S.discoverMsg   = 'Starting…';
  S.discoverLog   = [];
  S.discoverError = '';
  render();

  try {
    const resp = await fetch('/api/discover', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({repo}),
    });
    if (!resp.ok) {
      const j = await resp.json().catch(() => ({}));
      throw new Error(j.error || `Server error ${resp.status}`);
    }

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '', finished = false;

    while (!finished) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        if (!part.trim()) continue;
        let evtName = 'message', evtData = '';
        for (const line of part.split('\n')) {
          if (line.startsWith('event: ')) evtName = line.slice(7).trim();
          if (line.startsWith('data: '))  evtData = line.slice(6);
        }
        if (!evtData) continue;
        const d = JSON.parse(evtData);
        if (evtName === 'progress') {
          if (d.pct != null) S.discoverPct = d.pct;
          if (d.msg)         S.discoverMsg = d.msg;
          if (d.log)         S.discoverLog.push(d.log);
          render();
        } else if (evtName === 'done') {
          S.discoverPct = 100;
          S.discoverMsg = 'Done!';
          render();
          finished = true;
          // Transition to topics view using data embedded in the done event
          S.groups        = d.groups?.groups || [];
          S.repo          = d.groups?.repo   || repo;
          S.findingsIndex = d.findings_index || {};
          S.discovering   = false;
          S.phase         = 'topics';
          document.getElementById('header-meta').textContent = S.repo;
          render();
          break;
        } else if (evtName === 'error') {
          throw new Error(d.msg);
        }
      }
    }
  } catch(e) {
    S.discovering   = false;
    S.discoverError = e.message;
    render();
  }
}

// Load (or reload) findings for a specific group from the per-group file.
// S.running stays true until this resolves (when called from runPipeline).
async function loadResults(groupId) {
  try {
    const data = await fetch(`./data/findings_${groupId}.json`).then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    });
    const findings = (data.findings || []).sort((a,b) => {
      const cd = (b.confidence||0) - (a.confidence||0);
      if (cd !== 0) return cd;
      return (b.issue_created_at||'').localeCompare(a.issue_created_at||'');
    });
    S.loadedFindings[groupId] = findings;
    S.findingsIndex[groupId]  = {
      count:        findings.length,
      generated_at: data.metadata?.generated_at || '',
    };
    S.phase   = 'topics';
    S.running = false;

    const updated = data.metadata?.generated_at ? 'Last run ' + timeAgo(data.metadata.generated_at) : '';
    document.getElementById('header-meta').textContent = updated;
    render();
  } catch (e) {
    S.running  = false;
    S.runError = e.message;
    render();
  }
}

// View previously-run results without re-running the pipeline.
async function loadResultsFor(groupId) {
  S.selectedId  = groupId;
  S.expandedNum = null;
  await loadResults(groupId);
}

async function runPipeline(groupId) {
  S.running  = true;
  S.runPct   = 0;
  S.runMsg   = 'Starting…';
  S.runLog   = [];
  S.runError = '';
  render();

  try {
    const resp = await fetch(`/api/run/${encodeURIComponent(groupId)}`, { method: 'POST' });
    if (!resp.ok) {
      const j = await resp.json().catch(() => ({}));
      throw new Error(j.error || `Server error ${resp.status}`);
    }

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '', finished = false;

    while (!finished) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        if (!part.trim()) continue;
        let evtName = 'message', evtData = '';
        for (const line of part.split('\n')) {
          if (line.startsWith('event: ')) evtName = line.slice(7).trim();
          if (line.startsWith('data: '))  evtData = line.slice(6);
        }
        if (!evtData) continue;
        const d = JSON.parse(evtData);
        if (evtName === 'progress') {
          if (d.pct != null) S.runPct = d.pct;
          if (d.msg)         S.runMsg = d.msg;
          if (d.log)         S.runLog.push(d.log);
          if (d.group_open_count != null) {
            const g = S.groups.find(g => g.group_id === groupId);
            if (g) g.total_open_issues = d.group_open_count;
          }
          render();
        } else if (evtName === 'done') {
          S.runPct = 100;
          S.runMsg = 'Loading results…';
          render();
          finished = true;
          break;
        } else if (evtName === 'error') {
          throw new Error(d.msg);
        }
      }
    }

    await loadResults(groupId);  // atomically sets S.running = false and stores findings
  } catch (e) {
    S.running  = false;
    S.runError = e.message;
    render();
  }
}

function submitCustomTopic() {
  const raw = (document.getElementById('custom-topic-input')?.value || '').trim();
  if (!raw) return;
  const slug    = raw.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
  const groupId = 'search_' + slug;
  // Add or replace virtual group in sidebar
  S.groups = S.groups.filter(g => g.group_id !== groupId);
  S.groups.unshift({
    group_id:          groupId,
    display_name:      raw.replace(/\b\w/g, c => c.toUpperCase()),
    description:       `Custom search: ${raw}`,
    total_open_issues: 0,
    _custom:           true,
  });
  S.selectedId  = groupId;
  S.expandedNum = null;
  S.runError    = '';
  render();
  runPipeline(groupId);
}

function selectGroup(id) {
  S.selectedId  = id;
  S.expandedNum = null;
  S.runError    = '';
  render();
}


// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  const root = document.getElementById('root');
  if (S.phase === 'initial') {
    root.innerHTML = renderInitial();
  } else {
    root.innerHTML = renderSplit();
  }
  const runLog = document.getElementById('run-log');
  if (runLog) runLog.scrollTop = runLog.scrollHeight;
  const discoverLog = document.getElementById('discover-log');
  if (discoverLog) discoverLog.scrollTop = discoverLog.scrollHeight;
}

// Step 1: discover topics
function renderInitial() {
  if (S.discovering) {
    const logLines = S.discoverLog.slice(-60).map(l => {
      const c = /groups →/.test(l) ? 'log-ok' : /error/i.test(l) ? 'log-err' : '';
      return `<div class="${c}">${esc(l)}</div>`;
    }).join('');
    return `<div class="page">
      <div class="step-card">
        <div class="step-num">1</div>
        <h2>Fetching &amp; Analyzing Repository…</h2>
        <div class="progress-wrap"><div class="progress-bar" style="width:${S.discoverPct}%"></div></div>
        <div class="progress-msg">${esc(S.discoverMsg)}</div>
        <div class="run-log" id="discover-log">${logLines}</div>
      </div>
    </div>`;
  }

  return `<div class="page">
    <div class="step-card">
      <div class="step-num">1</div>
      <h2>Analyze a GitHub Repository</h2>
      <input id="repo-input" class="repo-input" type="text"
             placeholder="https://github.com/huggingface/transformers"
             onkeydown="if(event.key==='Enter')submitRepo()">
      <div class="step-actions">
        <button class="btn btn-primary" onclick="submitRepo()">Analyze Repository</button>
      </div>
      ${S.discoverError ? `<div class="step-error">⚠ ${esc(S.discoverError)}</div>` : ''}
    </div>
  </div>`;
}

// Two-column layout: sidebar + main
function renderSplit() {
  const repoLabel = S.repo
    ? `<a href="https://github.com/${esc(S.repo)}" target="_blank" rel="noopener"
          style="font-size:12px;color:#57606a;font-family:ui-monospace,monospace;">${esc(S.repo)}</a>`
    : '';
  return `<div class="split">
    <aside>
      <h2>Topic Groups ${repoLabel}</h2>
      <div class="custom-topic-form">
        <input id="custom-topic-input" class="custom-topic-input" type="text"
               placeholder="e.g. cuda"
               onkeydown="if(event.key==='Enter')submitCustomTopic()">
        <button class="custom-topic-btn" onclick="submitCustomTopic()">→</button>
      </div>
      <div class="group-list">${renderSidebar()}</div>
    </aside>
    <div class="main">
      ${renderMain()}
    </div>
  </div>`;
}

function renderSidebar() {
  return S.groups
    .filter(g => g.group_id !== 'other')
    .map(g => {
      const isSelected = g.group_id === S.selectedId;
      const loaded     = S.loadedFindings[g.group_id];
      const indexed    = S.findingsIndex[g.group_id];
      const count      = loaded ? loaded.length : indexed?.count;
      const badge      = count != null
        ? `<span class="findings-badge">${count}</span>`
        : '';
      return `<div class="group-item${isSelected ? ' selected' : ''}"
                   onclick="selectGroup('${esc(g.group_id)}')"
                   title="${esc(g.description||'')}">
        <div class="group-name"><span>${esc(g.display_name)}</span>${badge}</div>
        <div class="group-sub">
          ${g.total_open_issues.toLocaleString()} open
        </div>
      </div>`;
    }).join('');
}

function renderMain() {
  // No group selected yet
  if (!S.selectedId) {
    return `<div class="panel-header">
        <span class="panel-title">Select a topic group</span>
      </div>
      <div style="background:white;border:1px solid #d0d7de;border-radius:8px;padding:32px;text-align:center;color:#57606a;">
        Choose a group from the sidebar to continue.
      </div>`;
  }

  const group     = S.groups.find(g => g.group_id === S.selectedId);
  const groupName = group?.display_name || S.selectedId;
  const findings  = S.loadedFindings[S.selectedId];
  const indexed   = S.findingsIndex[S.selectedId];

  // Pipeline is running for this group
  if (S.running) {
    const logLines = S.runLog.slice(-60).map(l => {
      const c = /VALIDATED:/.test(l) ? 'log-ok' : /SKIP:|PRECHECK_REJECT/.test(l) ? 'log-warn' : /error/i.test(l) ? 'log-err' : '';
      return `<div class="${c}">${esc(l)}</div>`;
    }).join('');
    return `<div class="panel-header">
        <span class="panel-title">${esc(groupName)}</span>
        <span class="panel-sub">Running…</span>
      </div>
      <div class="step-card" style="max-width:100%;margin:0;">
        <div class="step-num">2</div>
        <h2>Analyzing ${esc(groupName)}…</h2>
        <div class="progress-wrap"><div class="progress-bar" style="width:${S.runPct}%"></div></div>
        <div class="progress-msg">${esc(S.runMsg)}</div>
        <div class="run-log" id="run-log">${logLines}</div>
      </div>`;
  }

  // Findings loaded in memory for this group → show them
  if (findings) {
    return `<div class="panel-header">
        <span class="panel-title">${esc(groupName)}</span>
        <span class="panel-sub">${findings.length} validated findings · sorted by confidence</span>
        <button class="btn btn-secondary" style="margin-left:auto;font-size:12px;padding:5px 11px;"
                onclick="runPipeline('${esc(S.selectedId)}')">Re-run</button>
      </div>
      <div class="issue-list">
        ${findings.map(f => renderCard(f)).join('')}
      </div>`;
  }

  // Findings exist on server (from a previous session) but not loaded yet
  if (indexed) {
    return `<div class="panel-header">
        <span class="panel-title">${esc(groupName)}</span>
        ${group ? `<span style="font-size:13px;color:#57606a;">${group.total_open_issues.toLocaleString()} open issues</span>` : ''}
      </div>
      <div class="step-card" style="max-width:100%;margin:0;">
        <div class="step-num">2</div>
        <h2>Previous results available</h2>
        <p><strong>${indexed.count}</strong> validated finding(s) from ${timeAgo(indexed.generated_at)}.</p>
        <div class="step-actions">
          <button class="btn btn-primary" onclick="loadResultsFor('${esc(S.selectedId)}')">
            View Results →
          </button>
          <button class="btn btn-secondary" onclick="runPipeline('${esc(S.selectedId)}')">
            Re-run Analysis
          </button>
        </div>
        ${S.runError ? `<div class="step-error">⚠ ${esc(S.runError)}</div>` : ''}
      </div>`;
  }

  // Not yet analyzed
  return `<div class="panel-header">
      <span class="panel-title">${esc(groupName)}</span>
      ${group ? `<span style="font-size:13px;color:#57606a;">${group.total_open_issues.toLocaleString()} open issues</span>` : ''}
    </div>
    <div class="step-card" style="max-width:100%;margin:0;">
      <div class="step-num">2</div>
      <h2>Run the Analysis Pipeline</h2>
      <p>Surface and validate the best candidate issues for <strong>${esc(groupName)}</strong>.</p>
      <div class="step-actions">
        <button class="btn btn-primary" onclick="runPipeline('${esc(S.selectedId)}')">
          Run Analysis →
        </button>
      </div>
      ${S.runError ? `<div class="step-error">⚠ ${esc(S.runError)}</div>` : ''}
    </div>`;
}

// ── Issue card (flat — no expand) ─────────────────────────────────────────────

function renderCard(f) {
  const conf = f.confidence ?? 0;
  const cls  = f.initial_classification || 'unknown';

  const labels = (f.issue_labels || []).slice(0, 6)
    .map(l => `<span class="${labelClass(l)}">${esc(l)}</span>`).join('');

  // hw / repro / scope chips
  const hw = (f.affected_hardware || []).map(h => `<span class="meta-chip"><em>hw</em>${esc(h)}</span>`).join('');
  const chips = [
    f.fix_scope && f.fix_scope !== 'unknown' ? `<span class="meta-chip"><em>scope</em>${esc(f.fix_scope.replace(/_/g,' '))}</span>` : '',
    hw,
    f.still_reproducible && f.still_reproducible !== 'unknown' ? `<span class="meta-chip"><em>repro</em>${esc(f.still_reproducible)}</span>` : '',
  ].filter(Boolean).join('');

  // Blocking signals — show as red pills
  const blockers = (f.blocking_signals || [])
    .map(b => `<span class="blocker-pill">⚠ ${esc(b.split(':')[0].replace(/_/g,' '))}</span>`)
    .join('');

  // Maintainer signal summary — type counts, no quotes
  const sigs = f.maintainer_signals || [];
  let sigSummary = '';
  if (sigs.length) {
    const counts = {};
    sigs.forEach(s => { counts[s.signal_type] = (counts[s.signal_type] || 0) + 1; });
    sigSummary = Object.entries(counts)
      .map(([t, n]) => (n > 1 ? `${t.replace(/_/g,' ')} ×${n}` : t.replace(/_/g,' ')))
      .join(' · ');
  }

  return `<div class="issue-card">
  <div class="card-left">
    <div class="issue-num">#${f.issue_number}</div>
    <div class="issue-title">
      <a href="${esc(f.issue_url)}" target="_blank" rel="noopener">${esc(f.issue_title)}</a>
    </div>
    <div class="card-meta">
      ${labels}
    </div>
    ${chips || blockers || sigSummary ? `<div class="card-chips">
      ${chips}
      ${blockers}
      ${sigSummary ? `<span class="signal-summary">↳ ${esc(sigSummary)}</span>` : ''}
    </div>` : ''}
  </div>
  <div class="card-right">
    <div class="conf-tooltip-wrap">
      <span class="conf-badge ${confClass(conf)}">${conf.toFixed(2)}</span>
      ${f.confidence_justification ? `<div class="conf-tooltip">${formatJustification(f.confidence_justification)}</div>` : ''}
    </div>
    <span class="issue-age">${timeAgo(f.issue_created_at)}</span>
  </div>
</div>`;
}

// ── Boot ──────────────────────────────────────────────────────────────────────

render();
</script>
</body>
</html>
